<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · {{ current }}</title>
  <!-- App shell provides Bootstrap 5 + Alpine.js; autocrud fragments assume these are loaded. -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">{{ title }}</a>
      <ul class="navbar-nav me-auto">
        {% for e in entities %}
        <li class="nav-item">
          <a class="nav-link {% if e.as_str() == current.as_str() %}active{% endif %}" href="/ui/{{ e }}">{{ e }}</a>
        </li>
        {% endfor %}
      </ul>
      <a class="btn btn-outline-light btn-sm" href="/docs" target="_blank">API docs</a>
    </div>
  </nav>

  <main class="container my-4">
    <div class="card shadow-sm">
      <div class="card-body">
        {{ table|safe }}
      </div>
    </div>
  </main>

  <footer class="text-center text-muted small py-3">
    Rune · autocrud — JSON API under <code>/api/v1</code>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
