<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <!-- Set the Bootstrap color mode before first paint (a remembered choice, else the browser's
       prefers-color-scheme) so there's no flash; the top-right button toggles it (script at end). -->
  <script>(function(){try{var s=localStorage.getItem('theme');}catch(e){}var t=s||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <!-- App shell provides Bootstrap 5 + Alpine.js; the crud Admin fragment assumes these. -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">{{ title }}</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        {% if !user.is_empty() %}
        <!-- Signed-in user → self-service profile/password page (auth.profile_path()). -->
        <a class="navbar-text text-light text-decoration-none" href="/profile" title="Profile &amp; password">
          <span aria-hidden="true">&#128100;</span> {{ user }}
        </a>
        <a class="btn btn-outline-light btn-sm" href="/logout">Log out</a>
        {% endif %}
        <!-- Light/dark toggle: sun in dark mode (→ light), moon in light mode (→ dark). -->
        <button id="theme-toggle" type="button" class="btn btn-outline-light btn-sm"
                onclick="ruToggleTheme()" aria-label="Toggle light / dark mode">&#9790;</button>
      </div>
    </div>
  </nav>

  <main class="container-fluid my-4">
    <div class="card shadow-sm">
      <div class="card-body">
        {{ body|safe }}
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function ruTheme(){return document.documentElement.getAttribute('data-bs-theme')||'light';}
    function ruThemeIcon(){var b=document.getElementById('theme-toggle');if(b){var d=ruTheme()==='dark';b.textContent=d?'☀':'☾';b.title=d?'Switch to light mode':'Switch to dark mode';}}
    function ruToggleTheme(){var n=ruTheme()==='dark'?'light':'dark';document.documentElement.setAttribute('data-bs-theme',n);try{localStorage.setItem('theme',n);}catch(e){}ruThemeIcon();}
    document.addEventListener('DOMContentLoaded',ruThemeIcon);
  </script>
</body>
</html>
