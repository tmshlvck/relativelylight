[package]
name = "relativelylight"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Web-app building blocks: auto-generated CRUD JSON API from your ORM entities, an auto-generated Alpine.js CRUD UI bound to that API, plus sessions, user authentication (password, TOTP 2FA, OIDC SSO), and user management."
repository = "https://github.com/tmshlvck/relativelylight"
homepage = "https://github.com/tmshlvck/relativelylight"
readme = "../README.md"
keywords = ["crud", "admin", "seaorm", "axum", "auth"]
categories = ["web-programming", "database", "authentication"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
http = "1"                       # the `authz` gate trait takes `http::HeaderMap` (no axum needed)
sea-orm = { workspace = true, optional = true }
axum = { version = "0.8", optional = true }
askama = { version = "0.13", optional = true }
utoipa = { version = "5", optional = true }
csv = { version = "1", optional = true }
argon2 = { version = "0.5", optional = true }
rand_core = { version = "0.6", features = ["getrandom"], optional = true }
axum-extra = { version = "0.10", features = ["cookie"], optional = true }
time = { version = "0.3", optional = true }
totp-rs = { version = "5.7", features = ["qr", "gen_secret"], optional = true } # TOTP 2FA: secret, otpauth URL, QR
openidconnect = { version = "4", optional = true } # OIDC relying-party (SSO); default async reqwest + rustls
regex = { version = "1", optional = true }         # SSO username → group mapping rules
base64 = { version = "0.22", optional = true }     # decode the verified ID-token payload; txn cookie

[features]
default = ["crud", "axum"]
crud = ["dep:sea-orm"]        # the CRUD engine + SeaORM backend (the `crud` module)
axum = ["dep:axum"]           # the HTTP router/handlers
ui = ["dep:askama", "crud"]   # the Bootstrap/Alpine admin components (Table, Admin)
openapi = ["dep:utoipa", "crud"]
csv = ["dep:csv", "crud"]
auth = ["dep:sea-orm", "dep:axum", "dep:axum-extra", "dep:argon2", "dep:rand_core", "dep:time", "dep:totp-rs"] # sessions/login + TOTP 2FA + Authz gate
sso = ["auth", "dep:openidconnect", "dep:regex", "dep:base64"] # OIDC single sign-on (Google / Okta / corporate) + group mapping
